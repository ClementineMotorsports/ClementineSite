<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1C1C"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B1A;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FF6B1A;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Glow overlay -->
  <ellipse cx="640" cy="360" rx="600" ry="400" fill="url(#glow)"/>
  <!-- Grid lines -->
  <line x1="0" y1="360" x2="1280" y2="360" stroke="#FF6B1A" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#FF6B1A" stroke-opacity="0.06" stroke-width="1"/>
  <!-- Corner accents -->
  <polyline points="40,40 40,80 80,80" fill="none" stroke="#FF6B1A" stroke-width="2" stroke-opacity="0.5"/>
  <polyline points="1240,40 1240,80 1200,80" fill="none" stroke="#FF6B1A" stroke-width="2" stroke-opacity="0.5"/>
  <polyline points="40,680 40,640 80,640" fill="none" stroke="#FF6B1A" stroke-width="2" stroke-opacity="0.5"/>
  <polyline points="1240,680 1240,640 1200,640" fill="none" stroke="#FF6B1A" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Orange accent bar -->
  <rect x="0" y="0" width="4" height="720" fill="#FF6B1A"/>
  <!-- Car name label -->
  <text x="640" y="320" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="96" fill="#FF6B1A" fill-opacity="0.12" text-anchor="middle" letter-spacing="-3">URUS</text>
  <text x="640" y="400" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="48" fill="white" fill-opacity="0.85" text-anchor="middle" letter-spacing="8">URUS</text>
  <text x="640" y="448" font-family="Arial, sans-serif" font-weight="400" font-size="18" fill="white" fill-opacity="0.4" text-anchor="middle" letter-spacing="6">2019 LAMBORGHINI · CHICAGO</text>
  <!-- CM badge -->
  <text x="640" y="540" font-family="Arial, sans-serif" font-size="12" fill="#FF6B1A" fill-opacity="0.6" text-anchor="middle" letter-spacing="4">CLEMENTINE MOTORSPORTS · CHICAGO</text>
  <!-- Bottom bar -->
  <rect x="0" y="714" width="1280" height="6" fill="#FF6B1A" fill-opacity="0.4"/>
</svg>
